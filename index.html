<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Core SEO Meta Parameters -->
    <title>StudyForge AI - Smart Study Planner for Students</title>
    <meta name="description" content="AI-powered study planner, timetable generator, revision tracker, quiz creator, and exam preparation assistant for students." />
    <meta name="keywords" content="study planner, AI study planner, timetable generator, exam preparation, revision tracker, student productivity, StudyForge AI" />
    <meta name="author" content="StudyForge AI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://studyforge-ai.vercel.app/" />

    <!-- Favicon and Site Icon Metadata -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph Meta Tags (Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studyforge-ai.vercel.app/" />
    <meta property="og:title" content="StudyForge AI - Smart Study Planner for Students" />
    <meta property="og:description" content="AI-powered study planner, timetable generator, revision tracker, quiz creator, and exam preparation assistant for students." />
    <meta property="og:image" content="https://studyforge-ai.vercel.app/og-image.png" />
    <meta property="og:site_name" content="StudyForge AI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://studyforge-ai.vercel.app/" />
    <meta name="twitter:title" content="StudyForge AI - Smart Study Planner for Students" />
    <meta name="twitter:description" content="AI-powered study planner, timetable generator, revision tracker, quiz creator, and exam preparation assistant for students." />
    <meta name="twitter:image" content="https://studyforge-ai.vercel.app/og-image.png" />

    <!-- Structured Data JSON-LD [1]: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "StudyForge AI",
      "alternateName": "StudyForge AI Scholar Suite",
      "url": "https://studyforge-ai.vercel.app/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://studyforge-ai.vercel.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data JSON-LD [2]: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "StudyForge AI",
      "url": "https://studyforge-ai.vercel.app/",
      "logo": "https://studyforge-ai.vercel.app/favicon.svg",
      "description": "Providing smart, AI-driven educational scheduling, active recall flashcards, and student productivity suites."
    }
    </script>

    <!-- Structured Data JSON-LD [3]: Educational Application -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "StudyForge AI",
      "operatingSystem": "All",
      "applicationCategory": "EducationalApplication",
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "imageUrl": "https://studyforge-ai.vercel.app/og-image.png",
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
      },
      "description": "AI-powered study planner, timetable generator, revision tracker, quiz creator, and exam preparation assistant for students to optimize academic success."
    }
    </script>
  </head>
  <body style="background-color: #020617; color: #f8fafc; margin: 0; font-family: system-ui, sans-serif;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
